<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — MC-AFK Bot Panel</title>
    <meta name="description" content="Create your MC-AFK Bot Panel account to start managing Minecraft AFK bot sessions.">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <a href="/" class="logo">
                    <i class="fa-solid fa-terminal"></i>
                    <span>MC-AFK Bot Panel</span>
                </a>
            </div>
        </header>

        <!-- Main centered auth area -->
        <main class="auth-main">
            <div class="auth-container glass-card" id="authBox">

                <!-- Brand Logo -->
                <a href="/" class="auth-logo">
                    <i class="fa-solid fa-terminal"></i>
                    <span>MC-AFK Bot Panel</span>
                </a>

                <!-- Heading -->
                <div class="auth-heading">
                    <h1>Create Account</h1>
                    <p>Set up your credentials to manage bot sessions</p>
                </div>

                <!-- Error alert -->
                <div class="auth-error" id="errorMessage">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="errorText"></span>
                </div>

                <!-- Signup Form -->
                <form id="signupForm" autocomplete="on">

                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input
                                type="text"
                                id="username"
                                class="form-input"
                                placeholder="Min. 4 characters"
                                required
                                minlength="4"
                                autocomplete="username"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input
                                type="password"
                                id="password"
                                class="form-input"
                                placeholder="Min. 6 characters"
                                required
                                minlength="6"
                                autocomplete="new-password"
                            >
                            <button type="button" class="pw-toggle" id="pwToggle1" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye" id="pwEyeIcon1"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input
                                type="password"
                                id="confirmPassword"
                                class="form-input"
                                placeholder="Repeat your password"
                                required
                                minlength="6"
                                autocomplete="new-password"
                            >
                            <button type="button" class="pw-toggle" id="pwToggle2" aria-label="Toggle confirm password visibility">
                                <i class="fa-solid fa-eye" id="pwEyeIcon2"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 8px;">
                        <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; padding: 12px; font-size: 0.95rem;">
                            <span id="btnLabel">Create Account</span>
                            <i class="fa-solid fa-user-plus" id="btnIcon"></i>
                        </button>
                    </div>

                    <div class="auth-link-row">
                        Already have an account? <a href="login.html">Sign In</a>
                    </div>

                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>MC-AFK Bot Panel &copy; 2026. Made with Vanilla Tech.</p>
        </footer>

    </div>

    <script>
        // Toggle password visibility helpers
        function setupToggle(toggleId, inputId, iconId) {
            document.getElementById(toggleId).addEventListener('click', () => {
                const input = document.getElementById(inputId);
                const icon  = document.getElementById(iconId);
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'fa-solid fa-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'fa-solid fa-eye';
                }
            });
        }

        setupToggle('pwToggle1', 'password', 'pwEyeIcon1');
        setupToggle('pwToggle2', 'confirmPassword', 'pwEyeIcon2');

        // Form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username        = document.getElementById('username').value.trim();
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn       = document.getElementById('submitBtn');
            const btnLabel        = document.getElementById('btnLabel');
            const btnIcon         = document.getElementById('btnIcon');

            // Client-side validation
            if (username.length < 4) {
                showError('Username must be at least 4 characters.');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }
            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            // Loading state
            submitBtn.disabled  = true;
            btnLabel.textContent = 'Creating account…';
            btnIcon.className   = 'fa-solid fa-spinner fa-spin';

            try {
                const res  = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = 'login.html?signupSuccess=true';
                } else {
                    showError(data.error || 'Signup failed. Please try again.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                submitBtn.disabled   = false;
                btnLabel.textContent = 'Create Account';
                btnIcon.className    = 'fa-solid fa-user-plus';
            }
        });

        function showError(msg) {
            const errorMsg  = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent  = msg;
            errorMsg.style.display = 'flex';

            const authBox = document.getElementById('authBox');
            if (authBox) {
                authBox.style.animation = 'none';
                authBox.offsetHeight; // force reflow
                authBox.style.animation = 'authShake 0.4s ease';
            }

            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 6000);
        }
    </script>
</body>
</html>
