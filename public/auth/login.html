<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — MC-AFK Bot Panel</title>
    <meta name="description" content="Sign in to your MC-AFK Bot Panel account to manage your Minecraft AFK bot sessions.">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <a href="/" class="logo">
                    <i class="fa-solid fa-terminal"></i>
                    <span>MC-AFK Bot Panel</span>
                </a>
            </div>
        </header>

        <!-- Main centered auth area -->
        <main class="auth-main">
            <div class="auth-container glass-card" id="authBox">

                <!-- Brand Logo -->
                <a href="/" class="auth-logo">
                    <i class="fa-solid fa-terminal"></i>
                    <span>MC-AFK Bot Panel</span>
                </a>

                <!-- Heading -->
                <div class="auth-heading">
                    <h1>Welcome back</h1>
                    <p>Sign in to manage your bot sessions</p>
                </div>

                <!-- Signup success banner (shown on redirect) -->
                <div class="auth-success-banner" id="signupSuccessAlert">
                    <i class="fa-regular fa-circle-check"></i>
                    Account created successfully! Sign in below.
                </div>

                <!-- Error alert -->
                <div class="auth-error" id="errorMessage">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="errorText"></span>
                </div>

                <!-- Login Form -->
                <form id="loginForm" autocomplete="on">

                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input
                                type="text"
                                id="username"
                                class="form-input"
                                placeholder="Enter your username"
                                required
                                autocomplete="username"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon-wrap">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input
                                type="password"
                                id="password"
                                class="form-input"
                                placeholder="••••••••"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye" id="pwEyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 8px;">
                        <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; padding: 12px; font-size: 0.95rem;">
                            <span class="btn-spinner" id="btnSpinner"></span>
                            <span id="btnLabel">Sign In</span>
                            <i class="fa-solid fa-arrow-right" id="btnChevron"></i>
                        </button>
                    </div>

                    <div class="auth-link-row">
                        Don't have an account? <a href="signup.html">Sign Up</a>
                    </div>

                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>MC-AFK Bot Panel &copy; 2026. Made with Vanilla Tech.</p>
        </footer>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Show signup success banner if redirected from signup
            const params = new URLSearchParams(window.location.search);
            if (params.get('signupSuccess') === 'true') {
                const banner = document.getElementById('signupSuccessAlert');
                if (banner) banner.style.display = 'flex';
            }
        });

        // Toggle password visibility
        document.getElementById('pwToggle').addEventListener('click', () => {
            const input = document.getElementById('password');
            const icon  = document.getElementById('pwEyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username   = document.getElementById('username').value.trim();
            const password   = document.getElementById('password').value;
            const submitBtn  = document.getElementById('submitBtn');
            const spinner    = document.getElementById('btnSpinner');
            const chevron    = document.getElementById('btnChevron');
            const label      = document.getElementById('btnLabel');
            const errorMsg   = document.getElementById('errorMessage');
            const errorText  = document.getElementById('errorText');

            // Loading state
            submitBtn.disabled  = true;
            spinner.style.display = 'inline-block';
            chevron.style.display = 'none';
            label.textContent     = 'Signing in…';
            errorMsg.style.display = 'none';

            try {
                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Invalid credentials. Please try again.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                submitBtn.disabled    = false;
                spinner.style.display = 'none';
                chevron.style.display = 'inline-block';
                label.textContent     = 'Sign In';
            }
        });

        function showError(msg) {
            const errorMsg  = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent  = msg;
            errorMsg.style.display = 'flex';

            const authBox = document.getElementById('authBox');
            if (authBox) {
                authBox.style.animation = 'none';
                authBox.offsetHeight; // force reflow
                authBox.style.animation = 'authShake 0.4s ease';
            }
        }
    </script>
</body>
</html>
