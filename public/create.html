<script>
    // Tasdiqlanmagan bo'lsa, tizimga kirish sahifasiga yo'naltirish
    document.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem('token');
        if (!token) {
            // Guest mode enabled, but create page is restricted. Do not redirect here unless user really needs auth.
            // Wait, the prompt says "Public/Guest access enabled! You can search, explore, and view existing bots without a password."
            // It does NOT say guests can create.
            // Let's assume guest CANNOT create.
            console.log('Guest user, redirecting to login');
            window.location.href = '/auth/login.html';
            return;
        }

        // Tokenni server orqali tekshirish
        try {
            const verify = await fetch('/api/auth/verify', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!verify.ok) {
                localStorage.removeItem('token');
                window.location.href = '/auth/login.html';
            }
        } catch (e) {
            localStorage.removeItem('token');
            window.location.href = '/auth/login.html';
        }
    });

    // DOM elementlari
    const serverForm = document.getElementById('serverForm');
    const portInput = document.getElementById('port');
    const typeRadios = document.querySelectorAll('input[name="type"]');
    const javaVersions = document.getElementById('javaVersions');
    const bedrockVersions = document.getElementById('bedrockVersions');
    const javaVersionSelect = document.getElementById('javaVersion');
    const bedrockVersionSelect = document.getElementById('bedrockVersion');
    const submitBtn = serverForm.querySelector('button[type="submit"]');

    // Server turiga qarab versiya tanlovchilarini boshqarish
    typeRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            const type = e.target.value;
            
            // Har ikkala tanlovni tiklash
            javaVersions.classList.remove('active');
            bedrockVersions.classList.remove('active');
            javaVersionSelect.required = false;
            bedrockVersionSelect.required = false;
            javaVersionSelect.disabled = true;
            bedrockVersionSelect.disabled = true;

            // Tanlangan turga mos blokni faollashtirish
            if (type === 'java') {
                javaVersions.classList.add('active');
                javaVersionSelect.required = true;
                javaVersionSelect.disabled = false;
            } else {
                bedrockVersions.classList.add('active');
                bedrockVersionSelect.required = true;
                bedrockVersionSelect.disabled = false;
            }
        });
    });

    // Forma yuborilishini qayta ishlash
    serverForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Yuklanish holatini ko'rsatish
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Yaratilmoqda...';

        // Autentifikatsiyani tekshirish
        const token = localStorage.getItem('token') || '';

        // Forma ma'lumotlarini olish
        const serverType = document.querySelector('input[name="type"]:checked').value;
        const formData = {
            ip: document.getElementById('ip').value.trim(),
            port: parseInt(document.getElementById('port').value),
            version: serverType === 'java' 
                ? javaVersionSelect.value 
                : bedrockVersionSelect.value,
            type: serverType
        };

        // Formani tekshirish
        if (!validateForm(formData)) {
            resetSubmitButton();
            return;
        }

        try {
            const response = await fetch('/api/projects', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error || "Serverni yaratib bo'lmadi");
            }

            if (result.success) {
                showSuccessMessage('Server muvaffaqiyatli yaratildi!');
                setTimeout(() => window.location.href = '/', 1500);
            } else {
                throw new Error(result.error || "Noma'lum xatolik yuz berdi");
            }
        } catch (error) {
            console.error('Server yaratishda xato:', error);
            showErrorMessage(error.message);
            resetSubmitButton();
        }
    });

    // Port qiymatini tekshirish
    portInput.addEventListener('input', (e) => {
        let value = parseInt(e.target.value) || 0;
        if (value < 1) value = 1;
        if (value > 65535) value = 65535;
        e.target.value = value;
    });

    // Yordamchi funksiyalar
    function validateForm(data) {
        if (!data.ip || !data.port || !data.version || !data.type) {
            showErrorMessage("Iltimos, barcha majburiy maydonlarni to'ldiring");
            return false;
        }

        if (isNaN(data.port) || data.port < 1 || data.port > 65535) {
            showErrorMessage("Port 1 va 65535 orasida bo'lishi kerak");
            return false;
        }

        return true;
    }

    function showSuccessMessage(message) {
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert success';
        alertDiv.textContent = message;
        serverForm.prepend(alertDiv);
        setTimeout(() => alertDiv.remove(), 3000);
    }

    function showErrorMessage(message) {
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert error';
        alertDiv.textContent = message;
        serverForm.prepend(alertDiv);
        setTimeout(() => alertDiv.remove(), 3000);
    }

    function resetSubmitButton() {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Server yaratish';
    }
</script>
