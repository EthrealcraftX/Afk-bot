    <script>
        let projectId = '';
        let serverType = '';

        // DOM elements
        const serverForm = document.getElementById('serverForm');
        const portInput = document.getElementById('port');
        const javaVersions = document.getElementById('javaVersions');
        const bedrockVersions = document.getElementById('bedrockVersions');
        const javaVersionSelect = document.getElementById('javaVersion');
        const bedrockVersionSelect = document.getElementById('bedrockVersion');
        const submitBtn = document.getElementById('submitBtn');

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const urlProject = urlParams.get('project') || urlParams.get('id');

            // Determine token and project ID
            if (urlToken) {
                if (urlToken.startsWith('project_') || /^project_\d+(_[a-z0-9]+)?$/.test(urlToken)) {
                    projectId = urlToken;
                } else {
                    localStorage.setItem('token', urlToken);
                }
            }
            if (urlProject) {
                projectId = urlProject;
            }

            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth/login.html';
                return;
            }

            if (!projectId) {
                showErrorMessage('Project ID is required.');
                return;
            }

            // Verify authentication session and load project data
            try {
                const response = await fetch(`/api/projects/${projectId}/status`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('token');
                        window.location.href = '/auth/login.html';
                        return;
                    }
                    const errRes = await response.json();
                    throw new Error(errRes.error || 'Failed to fetch server info');
                }
                const result = await response.json();
                if (result.success && result.details) {
                    populateForm(result.details);
                } else {
                    throw new Error('Server not found');
                }
            } catch (e) {
                showErrorMessage(e.message);
            }
        });

        function populateForm(details) {
            document.getElementById('ip').value = details.host || '';
            document.getElementById('port').value = details.port || '';
            serverType = details.type;

            const editionBadge = document.getElementById('editionBadge');
            if (details.type === 'java') {
                editionBadge.innerHTML = `<i class="fa-solid fa-mug-hot"></i> <span>Java Edition</span>`;
                selectType('java');
                javaVersionSelect.value = details.version;
            } else {
                editionBadge.innerHTML = `<i class="fa-solid fa-cube"></i> <span>Bedrock Edition</span>`;
                selectType('bedrock');
                bedrockVersionSelect.value = details.version;
            }
        }

        window.selectType = function(type) {
            javaVersions.classList.remove('active');
            bedrockVersions.classList.remove('active');
            
            javaVersionSelect.required = false;
            bedrockVersionSelect.required = false;
            javaVersionSelect.disabled = true;
            bedrockVersionSelect.disabled = true;

            if (type === 'java') {
                javaVersions.classList.add('active');
                javaVersionSelect.required = true;
                javaVersionSelect.disabled = false;
            } else {
                bedrockVersions.classList.add('active');
                bedrockVersionSelect.required = true;
                bedrockVersionSelect.disabled = false;
            }
        };

        function cleanIPAddress(ip) {
            let cleanIp = ip.trim().toLowerCase();
            
            // If it contains add.aternos. or aternos.me/ or aternos.org/ or is a redirect link, keep it as is so the backend can resolve it
            if (cleanIp.includes('add.aternos.') || cleanIp.includes('aternos.me/') || cleanIp.includes('aternos.org/')) {
                return ip.trim();
            }

            // Strip protocols (http://, https://) and www. if entered
            cleanIp = cleanIp.replace(/^(https?:\/\/)?(www\.)?/, '');
            
            return ip.trim();
        }

        // Live correction when user finishes typing and clicks away
        const ipInput = document.getElementById('ip');
        if (ipInput) {
            ipInput.addEventListener('blur', () => {
                ipInput.value = cleanIPAddress(ipInput.value);
            });
        }

        // Submit form edit request
        serverForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Saving Changes...';

            const token = localStorage.getItem('token') || '';
            const rawIp = document.getElementById('ip').value;
            const cleanedIp = cleanIPAddress(rawIp);
            document.getElementById('ip').value = cleanedIp; // update visually

            const formData = {
                ip: cleanedIp,
                port: parseInt(portInput.value),
                version: serverType === 'java'
                    ? javaVersionSelect.value
                    : bedrockVersionSelect.value
            };

            // Client side validation
            if (!validateForm(formData)) {
                resetSubmitButton();
                return;
            }

            try {
                const response = await fetch(`/api/projects/${projectId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || "Failed to update server settings");
                }

                if (result.success) {
                    showSuccessMessage('Server settings successfully updated!');
                    // If opened inside Telegram Mini App — close it
                    const tg = window.Telegram?.WebApp;
                    if (tg && tg.initData) {
                        tg.ready();
                        setTimeout(() => tg.close(), 1200);
                    } else {
                        setTimeout(() => window.location.href = '/', 1500);
                    }
                } else {
                    throw new Error(result.error || "Unknown response received from server");
                }
            } catch (error) {
                console.error('Server update error:', error);
                showErrorMessage(error.message);
                resetSubmitButton();
            }
        });

        function validateForm(data) {
            if (!data.ip || !data.port || !data.version) {
                showErrorMessage("Please fill out all required parameters.");
                return false;
            }
            if (isNaN(data.port) || data.port < 1 || data.port > 65535) {
                showErrorMessage("Connection port must be between 1 and 65535.");
                return false;
            }
            return true;
        }

        function showSuccessMessage(message) {
            clearAlerts();
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert success';
            alertDiv.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${message}</span>`;
            serverForm.prepend(alertDiv);
        }

        function showErrorMessage(message) {
            clearAlerts();
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert error';
            alertDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${message}</span>`;
            serverForm.prepend(alertDiv);
        }

        function clearAlerts() {
            const alerts = serverForm.querySelectorAll('.alert');
            alerts.forEach(a => a.remove());
        }

        function resetSubmitButton() {
            submitBtn.disabled = false;
            submitBtn.textContent = "O'zgarishlarni saqlash";
        }
    </script>
</body>
</html>
